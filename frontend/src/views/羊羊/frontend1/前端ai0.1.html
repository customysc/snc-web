<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>X-ware 工单管理仪表盘</title>
  <!-- 引入Bootstrap方便样式美观 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container my-4">
  <h2 class="mb-4">工单提交</h2>
  <!-- 工单表单，用户输入姓名、学号等内容 -->
  <form id="ticket-form" class="row g-3">
    <div class="col-md-4">
      <label class="form-label">姓名</label>
      <input type="text" class="form-control" name="name" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">学号</label>
      <input type="text" class="form-control" name="student_id" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">电脑型号</label>
      <input type="text" class="form-control" name="device_model" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">维修项目</label>
      <input type="text" class="form-control" name="repair_item" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">预计时间</label>
      <input type="text" class="form-control" name="estimate_time" placeholder="如 2026-03-27" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">维修状态</label>
      <select class="form-select" name="status" required>
        <option value="待维修">待维修</option>
        <option value="维修中">维修中</option>
        <option value="已完成">已完成</option>
      </select>
    </div>
    <div class="col-12">
      <button class="btn btn-success" type="submit">提交工单</button>
    </div>
  </form>

  <hr class="my-5">

  <h2 class="mb-3">工单列表</h2>
  <table class="table table-striped" id="ticket-table">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>姓名</th>
        <th>学号</th>
        <th>维修项目</th>
        <th>预计时间</th>
        <th>电脑型号</th>
        <th>状态</th>
      </tr>
    </thead>
    <!-- tbody用于动态插入工单数据 -->
    <tbody>
      <!-- 工单内容 JS自动插入 -->
    </tbody>
  </table>
</div>

<script>
  // 获取表单和表格body dom对象
  const form = document.getElementById('ticket-form');
  const tableBody = document.querySelector('#ticket-table tbody');

  // 查询所有工单并渲染到表格
  function fetchTickets() {
    // 前端fetch请求获取后端所有工单数据
    fetch('http://localhost:3001/api/tickets')
      .then(res => res.json())
      .then(data => {
        tableBody.innerHTML = ''; // 清空原表格内容
        data.forEach(ticket => {  // 遍历所有工单，插入表格一行
          const row = `<tr>
            <td>${ticket.id}</td>
            <td>${ticket.name}</td>
            <td>${ticket.student_id}</td>
            <td>${ticket.repair_item}</td>
            <td>${ticket.estimate_time}</td>
            <td>${ticket.device_model}</td>
            <td>${ticket.status}</td>
          </tr>`;
          tableBody.innerHTML += row;
        });
      });
  }

  // 监听表单提交事件，实现数据收集与POST提交
  form.addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止表单默认提交/刷新页面

    // 用FormData收集所有表单字段
    const fd = new FormData(form);
    const formData = {};
    fd.forEach((v,k) => formData[k]=v); // 转为普通对象便于JSON序列化

    // 发送POST请求至后端（新建工单）
    fetch('http://localhost:3001/api/ticket', {
      method: 'POST',
      headers: { "Content-Type": "application/json" }, // 明确声明请求体格式
      body: JSON.stringify(formData)
    }).then(res => res.json())
      .then(() => {
        form.reset();    // 清空表单
        fetchTickets();  // 刷新工单表格
      });
  });

  // 页面加载完成后，自动获取展示工单列表
  fetchTickets();

  // 定时自动刷新工单列表（10秒1次，掌握实时进度）
  setInterval(fetchTickets, 10000);
</script>
</body>
</html>
