<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>X-ware 工单管理仪表盘</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    .ticket-card { margin-bottom: 12px; }
    .ticket-column { min-height: 300px; background: #f8f9fa; border-radius: 6px; padding: 10px;}
    .ticket-column-header { font-weight: bold; font-size: 20px; margin-bottom: 12px;}
    .ticket-status-tag { font-size: 0.95em; }
  </style>
</head>
<body>

<div class="container my-4">
  <h2 class="mb-4">工单提交</h2>
  <!-- 工单表单，新增了维修人员下拉 -->
  <form id="ticket-form" class="row g-3">
    <div class="col-md-4">
      <label class="form-label">姓名</label>
      <input type="text" class="form-control" name="name" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">学号</label>
      <input type="text" class="form-control" name="student_id" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">电脑型号</label>
      <input type="text" class="form-control" name="device_model" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">维修项目</label>
      <input type="text" class="form-control" name="repair_item" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">预计时间</label>
      <input type="text" class="form-control" name="estimate_time" placeholder="如 2026-03-27" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">维修状态</label>
      <select class="form-select" name="status" required>
        <option value="待维修">待维修</option>
        <option value="维修中">维修中</option>
        <option value="已完成">已完成</option>
      </select>
    </div>
    <!-- 新增 维修人员 -->
    <div class="col-md-4">
      <label class="form-label">维修人员</label>
      <select class="form-select" name="repairer" required>
        <option value="">选择人员</option>
        <option value="张三">张三</option>
        <option value="李四">李四</option>
        <option value="王五">王五</option>
      </select>
    </div>
    <div class="col-12 pt-2">
      <button class="btn btn-success" type="submit">提交工单</button>
    </div>
  </form>

  <hr class="my-5">

  <div class="row">
    <!-- 未处理 -->
    <div class="col-md-4">
      <div class="ticket-column">
        <div class="ticket-column-header text-primary">未处理</div>
        <div id="ticket-todo"></div>
      </div>
    </div>
    <!-- 正在处理 -->
    <div class="col-md-4">
      <div class="ticket-column">
        <div class="ticket-column-header text-warning">正在处理</div>
        <div id="ticket-doing"></div>
      </div>
    </div>
    <!-- 已完成 -->
    <div class="col-md-4">
      <div class="ticket-column">
        <div class="ticket-column-header text-success">处理完成</div>
        <div id="ticket-done"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // === 维护所有工单状态栏的DOM对象 ===
  const columns = {
    '待维修': document.getElementById('ticket-todo'),    // 未处理区
    '维修中': document.getElementById('ticket-doing'),   // 正在处理区
    '已完成': document.getElementById('ticket-done')     // 已完成区
  };
  const statusOrder = ['待维修', '维修中', '已完成'];

  // == 拉取所有工单并分类渲染 ==
  function fetchTickets() {
    fetch('http://localhost:3001/api/tickets')
      .then(res => res.json())
      .then(data => {
        // 1. 三个分区先清空
        statusOrder.forEach(st => columns[st].innerHTML = '');
        // 2. 遍历所有工单，渲染到状态对应的区
        data.forEach(ticket => columns[ticket.status]?.appendChild(renderTicketCard(ticket)));
      });
  }

  // == 渲染单工单卡片 ==
  function renderTicketCard(ticket) {
    const div = document.createElement('div');
    div.className = 'card ticket-card shadow-sm';
    // 状态标签颜色
    let stColor = '';
    if(ticket.status==='待维修') stColor='secondary';
    else if(ticket.status==='维修中') stColor='warning';
    else stColor='success';

    div.innerHTML = `
      <div class="card-body py-2 px-3">
        <div><strong>${ticket.name}</strong> <small class="badge bg-${stColor} ticket-status-tag">${ticket.status}</small></div>
        <div>学号：${ticket.student_id}</div>
        <div>项目：${ticket.repair_item}</div>
        <div>型号：${ticket.device_model}</div>
        <div>预计：${ticket.estimate_time}</div>
        <div>维修人员：${ticket.repairer ? ticket.repairer : '-'}</div>
        <div class="mt-2" id="ticket-card-action"></div>
      </div>
    `;

    const ops = div.querySelector('#ticket-card-action');
    const currIdx = statusOrder.indexOf(ticket.status);
    if(currIdx > 0) {
      // 左移（上一状态）
      const btnLeft = document.createElement('button');
      btnLeft.className = 'btn btn-outline-secondary btn-sm me-2';
      btnLeft.innerText = '←';
      btnLeft.title = '移至上一状态';
      btnLeft.onclick = () => updateStatus(ticket.id, statusOrder[currIdx - 1]);
      ops.appendChild(btnLeft);
    }
    if(currIdx < statusOrder.length - 1) {
      // 右移（下一状态）
      const btnRight = document.createElement('button');
      btnRight.className = 'btn btn-outline-secondary btn-sm';
      btnRight.innerText = '→';
      btnRight.title = '移至下一状态';
      btnRight.onclick = () => updateStatus(ticket.id, statusOrder[currIdx + 1]);
      ops.appendChild(btnRight);
    }
    return div;
  }

  // == 改变工单状态 ==
  function updateStatus(id, newStatus) {
    fetch(`http://localhost:3001/api/ticket/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    })
    .then(res => {
      if(res.ok) fetchTickets();
    });
  }

  // == 提交新工单 ==
  document.getElementById('ticket-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const fd = new FormData(this);
    const formData = {};
    fd.forEach((v,k) => formData[k]=v);

    // 检查必须选择维修人员
    if (!formData.repairer) {
      alert('请选择维修人员');
      return;
    }

    // 发POST
    fetch('http://localhost:3001/api/ticket', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(formData)
    })
    .then(res => res.json())
    .then(() => {
      this.reset();
      fetchTickets();
    });
  });

  // == 首次页面加载和定时刷新 ==
  fetchTickets();
  setInterval(fetchTickets, 10000);
</script>
</body>
</html>
