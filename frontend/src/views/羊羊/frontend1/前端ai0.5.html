<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>X-ware 维修工单看板</title>
  <style>
    :root {
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e6eaf2;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --success: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
    }
    .container {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1 { margin: 0 0 18px; font-size: 24px; }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .worker-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 6px 20px rgba(17, 24, 39, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }

    .worker-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: linear-gradient(180deg, #ffffff, #fbfcff);
    }

    .worker-name { font-weight: 700; font-size: 18px; }

    .add-btn {
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: transform .2s ease, opacity .2s ease;
    }
    .add-btn:hover { opacity: .92; transform: translateY(-1px); }

    .worker-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 260px;
      transition: background-color .2s ease;
    }

    .worker-body.drag-over {
      background: #f0f7ff;
    }

    .empty-tip {
      color: var(--muted);
      font-size: 13px;
      padding: 8px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      background: #fafbff;
    }

    .ticket-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
      cursor: grab;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }
    .ticket-card:active { cursor: grabbing; }
    .ticket-card.dragging {
      opacity: .45;
      transform: scale(.98);
    }

    .ticket-title { font-weight: 700; margin-bottom: 8px; font-size: 14px; }
    .ticket-line { font-size: 13px; color: #374151; margin: 3px 0; word-break: break-all; }
    .ticket-line span { color: var(--muted); margin-right: 4px; }

    .status-btn {
      margin-top: 10px;
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      color: #111827;
      cursor: pointer;
      transition: all .2s ease;
      font-weight: 600;
    }
    .status-btn.done {
      border-color: #15803d;
      background: #22c55e;
      color: #fff;
    }

    /* 插入位置占位线 */
    .drop-placeholder {
      height: 8px;
      border-radius: 999px;
      background: #60a5fa;
      margin: 2px 0 8px;
      transition: all .2s ease;
      opacity: 0;
      transform: scaleX(.8);
    }
    .drop-placeholder.show {
      opacity: 1;
      transform: scaleX(1);
    }

    /* 通用弹窗 */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 999;
    }
    .modal-mask.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      width: 100%;
      max-width: 540px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 45px rgba(2, 8, 23, 0.2);
      transform: translateY(10px) scale(.98);
      opacity: 0;
      transition: transform .2s ease, opacity .2s ease;
    }
    .modal-mask.show .modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title { margin: 0; font-size: 18px; }
    .close-btn {
      border: none; background: transparent; font-size: 18px;
      cursor: pointer; line-height: 1; color: #6b7280;
    }
    .modal-body { padding: 14px 16px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }

    label { font-size: 13px; color: #4b5563; }
    input, textarea {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
      background: #fff;
    }
    input:focus, textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    textarea { min-height: 84px; resize: vertical; }

    .modal-footer {
      padding: 12px 16px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .2s ease, transform .2s ease;
    }
    .btn:hover { opacity: .93; transform: translateY(-1px); }
    .btn-cancel { background: #e5e7eb; color: #111827; }
    .btn-submit { background: var(--primary); color: #fff; }

    .btn-move { background: #2563eb; color: #fff; }
    .btn-copy { background: #0ea5e9; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>X-ware 维修工单看板</h1>
    <div class="board" id="board"></div>
  </div>

  <!-- 添加项目弹窗 -->
  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">添加项目</h3>
        <button class="close-btn" id="closeModalBtn">✕</button>
      </div>
      <form id="ticketForm">
        <div class="modal-body">
          <div class="grid">
            <div class="field">
              <label>姓名</label>
              <input name="name" required />
            </div>
            <div class="field">
              <label>学院</label>
              <input name="college" required />
            </div>
            <div class="field">
              <label>学号</label>
              <input name="studentId" required />
            </div>
            <div class="field">
              <label>电脑型号</label>
              <input name="deviceModel" required />
            </div>
            <div class="field full">
              <label>维修项目</label>
              <textarea name="repairItem" required></textarea>
            </div>
            <div class="field full">
              <label>报修时间</label>
              <input name="reportTime" id="reportTimeInput" required />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn-submit">提交项目</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 移动/复制确认弹窗 -->
  <div class="modal-mask" id="moveCopyMask">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <h3 class="modal-title">操作选择</h3>
        <button class="close-btn" id="closeMoveCopyBtn">✕</button>
      </div>
      <div class="modal-body">
        已拖拽到新位置，选择“移动”或“复制”：
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="moveCopyCancelBtn">取消</button>
        <button class="btn btn-copy" id="copyBtn">复制</button>
        <button class="btn btn-move" id="moveBtn">移动</button>
      </div>
    </div>
  </div>

  <script>
    const workers = ["张三", "李四", "王五", "赵六"];
    const store = {};
    workers.forEach(w => store[w] = []);

    const board = document.getElementById("board");

    const modalMask = document.getElementById("modalMask");
    const modalTitle = document.getElementById("modalTitle");
    const ticketForm = document.getElementById("ticketForm");
    const reportTimeInput = document.getElementById("reportTimeInput");

    const moveCopyMask = document.getElementById("moveCopyMask");

    let currentWorker = "";

    // 拖拽上下文
    let dragContext = null;
    // {
    //   fromWorker, fromIndex,
    //   toWorker, toIndex,
    //   itemSnapshot
    // }

    function getNowTimeString() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function openModal(workerName) {
      currentWorker = workerName;
      modalTitle.textContent = `为 ${workerName} 添加项目`;
      ticketForm.reset();
      reportTimeInput.value = getNowTimeString();
      modalMask.classList.add("show");
    }

    function closeModal() {
      modalMask.classList.remove("show");
      currentWorker = "";
    }

    function openMoveCopyModal() {
      moveCopyMask.classList.add("show");
    }

    function closeMoveCopyModal() {
      moveCopyMask.classList.remove("show");
      dragContext = null;
    }

    function renderBoard() {
      board.innerHTML = "";

      workers.forEach(worker => {
        const panel = document.createElement("section");
        panel.className = "worker-panel";

        const header = document.createElement("div");
        header.className = "worker-header";

        const name = document.createElement("div");
        name.className = "worker-name";
        name.textContent = worker;

        const addBtn = document.createElement("button");
        addBtn.className = "add-btn";
        addBtn.textContent = "添加项目";
        addBtn.onclick = () => openModal(worker);

        header.appendChild(name);
        header.appendChild(addBtn);

        const body = document.createElement("div");
        body.className = "worker-body";
        body.dataset.worker = worker;

        // 给每个工作区添加拖拽接收能力
        enableDropZone(body, worker);

        const list = store[worker];
        if (!list.length) {
          const empty = document.createElement("div");
          empty.className = "empty-tip";
          empty.textContent = "暂无项目，点击“添加项目”开始录入。";
          body.appendChild(empty);
        } else {
          list.forEach((item, idx) => {
            const card = document.createElement("div");
            card.className = "ticket-card";
            card.draggable = true;
            card.dataset.worker = worker;
            card.dataset.index = String(idx);

            // 拖拽事件
            card.addEventListener("dragstart", (e) => {
              card.classList.add("dragging");
              const payload = { fromWorker: worker, fromIndex: idx };
              e.dataTransfer.setData("text/plain", JSON.stringify(payload));
              e.dataTransfer.effectAllowed = "copyMove";
            });
            card.addEventListener("dragend", () => {
              card.classList.remove("dragging");
              clearAllPlaceholders();
              removeAllDragOver();
            });

            card.innerHTML = `
              <div class="ticket-title">项目 #${idx + 1}</div>
              <div class="ticket-line"><span>姓名:</span>${item.name}</div>
              <div class="ticket-line"><span>学院:</span>${item.college}</div>
              <div class="ticket-line"><span>学号:</span>${item.studentId}</div>
              <div class="ticket-line"><span>电脑型号:</span>${item.deviceModel}</div>
              <div class="ticket-line"><span>维修项目:</span>${item.repairItem}</div>
              <div class="ticket-line"><span>报修时间:</span>${item.reportTime}</div>
            `;

            const statusBtn = document.createElement("button");
            statusBtn.className = "status-btn" + (item.done ? " done" : "");
            statusBtn.textContent = item.done ? "已维修" : "未维修";
            statusBtn.onclick = () => {
              item.done = !item.done;
              renderBoard();
            };

            card.appendChild(statusBtn);
            body.appendChild(card);
          });
        }

        panel.appendChild(header);
        panel.appendChild(body);
        board.appendChild(panel);
      });
    }

    // 创建占位线
    function createPlaceholder() {
      const p = document.createElement("div");
      p.className = "drop-placeholder";
      return p;
    }

    function clearAllPlaceholders() {
      document.querySelectorAll(".drop-placeholder").forEach(p => p.remove());
    }

    function removeAllDragOver() {
      document.querySelectorAll(".worker-body.drag-over").forEach(el => el.classList.remove("drag-over"));
    }

    // 计算应该插入到哪个索引（依据鼠标Y）
    function getInsertIndex(container, mouseY) {
      const cards = [...container.querySelectorAll(".ticket-card:not(.dragging)")];
      let index = cards.length; // 默认尾部
      for (let i = 0; i < cards.length; i++) {
        const rect = cards[i].getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (mouseY < mid) {
          index = i;
          break;
        }
      }
      return index;
    }

    // 在指定位置展示占位线（0.2s变化）
    function showPlaceholder(container, index) {
      clearAllPlaceholders();
      const p = createPlaceholder();

      const cards = [...container.querySelectorAll(".ticket-card:not(.dragging)")];
      if (cards.length === 0 || index >= cards.length) {
        container.appendChild(p);
      } else {
        container.insertBefore(p, cards[index]);
      }
      requestAnimationFrame(() => p.classList.add("show"));
    }

    function enableDropZone(container, worker) {
      container.addEventListener("dragover", (e) => {
        e.preventDefault();
        container.classList.add("drag-over");
        const idx = getInsertIndex(container, e.clientY);
        showPlaceholder(container, idx);
      });

      container.addEventListener("dragleave", (e) => {
        // 离开当前容器时移除高亮（进入子元素不处理）
        if (!container.contains(e.relatedTarget)) {
          container.classList.remove("drag-over");
        }
      });

      container.addEventListener("drop", (e) => {
        e.preventDefault();
        container.classList.remove("drag-over");

        const txt = e.dataTransfer.getData("text/plain");
        if (!txt) return;

        let payload;
        try { payload = JSON.parse(txt); } catch { return; }

        const { fromWorker, fromIndex } = payload;
        const fromList = store[fromWorker];
        if (!fromList || fromIndex < 0 || fromIndex >= fromList.length) return;

        const toWorker = worker;
        let toIndex = getInsertIndex(container, e.clientY);

        // 同列内移动时，若从前往后，去掉原位置后索引要 -1
        if (fromWorker === toWorker && fromIndex < toIndex) {
          toIndex -= 1;
        }

        const itemSnapshot = JSON.parse(JSON.stringify(fromList[fromIndex]));

        clearAllPlaceholders();
        removeAllDragOver();

        // 保存上下文，弹窗选择移动/复制
        dragContext = { fromWorker, fromIndex, toWorker, toIndex, itemSnapshot };
        openMoveCopyModal();
      });
    }

    function doMove() {
      if (!dragContext) return;
      const { fromWorker, fromIndex, toWorker, toIndex } = dragContext;
      const item = store[fromWorker][fromIndex];
      if (!item) return closeMoveCopyModal();

      // 删除原位置
      store[fromWorker].splice(fromIndex, 1);

      // 插入目标位置
      const targetList = store[toWorker];
      const safeIndex = Math.max(0, Math.min(toIndex, targetList.length));
      targetList.splice(safeIndex, 0, item);

      closeMoveCopyModal();
      renderBoard();
    }

    function doCopy() {
      if (!dragContext) return;
      const { toWorker, toIndex, itemSnapshot } = dragContext;
      const targetList = store[toWorker];
      const safeIndex = Math.max(0, Math.min(toIndex, targetList.length));
      targetList.splice(safeIndex, 0, itemSnapshot);

      closeMoveCopyModal();
      renderBoard();
    }

    // 添加项目
    ticketForm.addEventListener("submit", (e) => {
      e.preventDefault();
      if (!currentWorker) return;

      const fd = new FormData(ticketForm);
      const item = {
        name: String(fd.get("name") || "").trim(),
        college: String(fd.get("college") || "").trim(),
        studentId: String(fd.get("studentId") || "").trim(),
        deviceModel: String(fd.get("deviceModel") || "").trim(),
        repairItem: String(fd.get("repairItem") || "").trim(),
        reportTime: String(fd.get("reportTime") || "").trim(),
        done: false
      };

      if (!item.name || !item.college || !item.studentId || !item.deviceModel || !item.repairItem || !item.reportTime) {
        alert("请完整填写所有字段");
        return;
      }

      store[currentWorker].push(item);
      closeModal();
      renderBoard();
    });

    // 添加弹窗关闭事件
    modalMask.addEventListener("click", (e) => { if (e.target === modalMask) closeModal(); });
    document.getElementById("closeModalBtn").onclick = closeModal;
    document.getElementById("cancelBtn").onclick = closeModal;

    // 移动复制弹窗事件
    moveCopyMask.addEventListener("click", (e) => { if (e.target === moveCopyMask) closeMoveCopyModal(); });
    document.getElementById("closeMoveCopyBtn").onclick = closeMoveCopyModal;
    document.getElementById("moveCopyCancelBtn").onclick = closeMoveCopyModal;
    document.getElementById("moveBtn").onclick = doMove;
    document.getElementById("copyBtn").onclick = doCopy;

    // 初始化
    renderBoard();
  </script>
</body>
</html>
